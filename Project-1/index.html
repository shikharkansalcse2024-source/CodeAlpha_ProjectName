<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Language Translation Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">

    <h1>🌍 Translate</h1>

    <!-- Row: source language dropdown + swap button + target language dropdown -->
    <div class="lang-row">
      <select id="sourceLang">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="es">Spanish</option>
        <option value="ar">Arabic</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
      </select>

      <button id="swapBtn" title="Swap languages">⇄</button>

      <select id="targetLang">
        <option value="hi">Hindi</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="es">Spanish</option>
        <option value="ar">Arabic</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
      </select>
    </div>

    <!-- Input text area -->
    <textarea id="inputText" placeholder="Type text to translate..."></textarea>

    <!-- Translate button -->
    <button id="translateBtn">Translate</button>

    <!-- Output box -->
    <div class="output-box">
      <p id="outputText">Translation will appear here.</p>

      <!-- Bonus: Copy + Speak buttons -->
      <div class="output-actions">
        <button id="copyBtn">📋 Copy</button>
        <button id="speakBtn">🔊 Speak</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
